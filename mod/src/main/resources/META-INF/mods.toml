modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

# The MochiOS connector mod must be present and load BEFORE us so
# MochiMod.DISPATCH exists when we register our receiver extension.
[[dependencies."${mod_id}"]]
    modId="mochi"
    mandatory=true
    versionRange="[0.1.0,)"
    ordering="AFTER"
    side="SERVER"

[[dependencies."${mod_id}"]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies."${mod_id}"]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
